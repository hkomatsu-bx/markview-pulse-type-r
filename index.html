<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markview Pulse Type R</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <!-- ツールバー（Fluent Command Bar 風）: 印刷時は非表示（@media print）。
         アイコン＋ラベル構成・主操作はブランドレッドのプライマリ。SVG アイコンは
         currentColor でテーマ追従。アプリ名/アイコンはネイティブタイトルバーが担う。 -->
    <header class="toolbar" id="toolbar">
      <div class="seg" role="tablist" aria-label="表示モード">
        <button id="mode-preview" class="seg-btn is-active" role="tab">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          プレビュー
        </button>
        <button id="mode-source" class="seg-btn" role="tab" data-testid="mode-source">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="16 18 22 12 16 6" />
            <polyline points="8 6 2 12 8 18" />
          </svg>
          原文
        </button>
      </div>
      <!-- 差分強調トグル（FR-03）: プレビューに前回↔現在の語差分を重畳。原文モードでは無効。 -->
      <button
        id="diff-toggle"
        class="btn btn-toggle is-active"
        type="button"
        data-testid="diff-toggle"
        aria-pressed="true"
        title="差分強調（前回からの変更をプレビューに重ねる）"
      >
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <path d="M12 3v18" />
        </svg>
        差分強調
      </button>
      <span class="spacer"></span>
      <!-- 文字サイズ（ズーム）: クリックで段階拡大、Ctrl+ホイール / Ctrl +,-,0 でも調整。
           本文（プレビュー/原文）のみを拡大し、ツールバー等は等倍を維持する。 -->
      <button
        id="content-zoom"
        class="btn"
        data-testid="content-zoom-button"
        title="文字サイズを切り替え（Ctrl+ホイールでも調整）"
        aria-label="文字サイズ（クリックで拡大）"
      >
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
          <line x1="11" y1="8" x2="11" y2="14" />
          <line x1="8" y1="11" x2="14" y2="11" />
        </svg>
        <span class="zoom-label">100%</span>
      </button>
      <!-- オーバーフロー（その他）メニュー: 副次コマンドを「…」へ集約する。
           ボタンの id/data-testid は据え置き、メニュー内へ移設するだけ。 -->
      <div class="more-wrap">
        <button
          id="more-menu-button"
          class="btn btn-icon"
          type="button"
          aria-haspopup="menu"
          aria-expanded="false"
          aria-controls="more-menu"
          data-testid="more-menu-button"
          title="その他のコマンド"
          aria-label="その他のコマンド"
        >
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="5" cy="12" r="1.6" />
            <circle cx="12" cy="12" r="1.6" />
            <circle cx="19" cy="12" r="1.6" />
          </svg>
        </button>
        <div
          id="more-menu"
          class="more-menu hidden"
          role="menu"
          aria-label="その他のコマンド"
          data-testid="more-menu"
        >
          <button
            id="open-file"
            class="btn menu-item"
            type="button"
            role="menuitem"
            title="ファイルを開く"
          >
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.96 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"
              />
            </svg>
            ファイルを開く
          </button>
          <button
            id="content-width"
            class="btn menu-item"
            type="button"
            role="menuitem"
            data-testid="content-width-button"
            title="本文の表示幅を切り替え"
            aria-label="本文幅（クリックで切替）"
          >
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <polyline points="8 7 4 12 8 17" />
              <polyline points="16 7 20 12 16 17" />
              <line x1="4" y1="12" x2="20" y2="12" />
            </svg>
            <span class="width-label">標準</span>
          </button>
          <button
            id="print"
            class="btn menu-item"
            type="button"
            role="menuitem"
            title="印刷 / PDF 書き出し（Ctrl+P）"
          >
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            印刷 / PDF
          </button>
          <!-- エディタで開く（FR-19）: アクティブファイルを OS 既定アプリで開く。タブ未選択時は無効。 -->
          <button
            id="open-in-editor"
            class="btn menu-item"
            type="button"
            role="menuitem"
            data-testid="open-in-editor"
            title="現在のファイルを既定のエディタ／アプリで開く"
            aria-label="エディタで開く"
            disabled
            aria-disabled="true"
          >
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
            エディタで開く
          </button>
          <div class="menu-sep" role="separator"></div>
          <!-- テーマ切替（ライト/ダーク/システム）。system は OS 追従。 -->
          <div
            class="menu-theme seg"
            role="tablist"
            aria-label="テーマ"
            data-testid="theme-switch"
          >
            <button
              id="theme-light"
              class="seg-btn seg-btn-icon"
              type="button"
              role="tab"
              aria-label="ライト"
              title="ライト"
            >
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4" />
                <path
                  d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"
                />
              </svg>
            </button>
            <button
              id="theme-dark"
              class="seg-btn seg-btn-icon"
              type="button"
              role="tab"
              aria-label="ダーク"
              title="ダーク"
            >
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" />
              </svg>
            </button>
            <button
              id="theme-system"
              class="seg-btn seg-btn-icon is-active"
              type="button"
              role="tab"
              aria-label="システム（OS 追従）"
              title="システム（OS 追従）"
            >
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="4" width="18" height="12" rx="2" />
                <path d="M8 20h8M12 16v4" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- タブバー: 開いているファイルを並べる（FR-04） -->
    <nav
      class="tabbar"
      id="tabbar"
      role="tablist"
      aria-label="開いているファイル"
    ></nav>

    <main class="scroll" id="content">
      <!-- プレビュー: markdown-it の出力を描画。差分モードでは差分注釈を重ねる -->
      <article id="preview" class="markdown-body"></article>
      <!-- ウェルカム画面（FR-06）: タブが 0 のとき表示。ロゴ＋導線＋波形アニメ。 -->
      <div id="empty-state" class="empty-state welcome" data-testid="welcome">
        <!-- ロゴ（ブランドロックアップ）をインライン SVG で描画する。
             <img> 参照ではロゴ内部のパスを外部 CSS で操作できないためインライン化し、
             ロゴ自身の波形に「Pulse」のスイープを走らせる。色はテーマ変数へ追従。 -->
        <div class="welcome-logo">
          <svg
            class="welcome-logo-svg"
            viewBox="0 0 1110 150"
            role="img"
            aria-label="Markview Pulse Type R"
          >
            <text
              class="logo-text"
              x="28"
              y="98"
              font-size="100"
              font-weight="600"
              letter-spacing="-1"
            >Markview Pulse</text>
            <!-- 波形: 薄い全体トレース＋明るい走査パルスの 2 重ね。 -->
            <path
              class="logo-wave-base"
              d="M24 114 H470 L476 111 L482 114 L490 100 L505 128 L515 114 L521 114 H760"
            />
            <path
              class="logo-wave-pulse"
              pathLength="100"
              d="M24 114 H470 L476 111 L482 114 L490 100 L505 128 L515 114 L521 114 H760"
            />
            <rect class="logo-badge" x="823.6" y="24" width="268" height="78" rx="14" />
            <text
              class="logo-badge-text"
              x="841.6"
              y="84"
              font-size="60"
              font-weight="700"
              letter-spacing="6"
            >TYPE R</text>
          </svg>
          <!-- バージョン番号（<major>.<minor>.<revision>.<commit>）。
               ビルド時に main.ts が __APP_VERSION__ を流し込む。ロゴ右下にバッジ表示。 -->
          <span
            id="app-version"
            class="welcome-version"
            data-testid="app-version"
            aria-label="バージョン"
          ></span>
        </div>
        <p class="welcome-lead">Markdown ファイルを開いてください。</p>
        <div class="welcome-actions">
          <button
            id="welcome-open"
            class="btn btn-accent"
            data-testid="welcome-open"
          >
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.96 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"
              />
            </svg>
            ファイルを開く
          </button>
          <span class="welcome-hint">またはここにファイルをドラッグ</span>
        </div>
      </div>
    </main>

    <!-- ステータスバー（FR-07）: 文字数/行数/エンコーディング。印刷時は非表示。 -->
    <footer
      class="statusbar hidden"
      id="statusbar"
      data-testid="status-bar"
    ></footer>

    <!-- 右クリックのカスタムコンテキストメニュー: コピー / 表示幅 / 印刷 / エディタ。
         既定の WebView メニューは抑止し、本メニューを表示する。位置はクリック座標。 -->
    <div
      id="context-menu"
      class="more-menu context-menu hidden"
      role="menu"
      aria-label="コンテキストメニュー"
      data-testid="context-menu"
    >
      <button id="ctx-copy" class="btn menu-item" type="button" role="menuitem">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="9" y="9" width="12" height="12" rx="2" />
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
        </svg>
        コピー
      </button>
      <button id="ctx-width" class="btn menu-item" type="button" role="menuitem">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="8 7 4 12 8 17" />
          <polyline points="16 7 20 12 16 17" />
          <line x1="4" y1="12" x2="20" y2="12" />
        </svg>
        <span class="ctx-width-label">標準</span>
      </button>
      <button id="ctx-print" class="btn menu-item" type="button" role="menuitem">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
        印刷 / PDF
      </button>
      <button id="ctx-editor" class="btn menu-item" type="button" role="menuitem">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
        </svg>
        エディタで開く
      </button>
    </div>
  </body>
</html>
