name: Release

# v*.*.* タグの push を契機にリリース版 exe をビルドし、GitHub Release を作成する。
# CI（ci.yml）とは独立。タグは CI 成功済みのコミットに対して付与する運用を前提とする。
on:
  push:
    tags:
      - "v*.*.*"

# Release 作成とアセット添付には contents: write が必要（ci.yml は read のみ）。
permissions:
  contents: write

env:
  NODE_VERSION: "22"

jobs:
  release:
    name: Build exe and publish GitHub Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # rust-toolchain.toml でチャンネルと components を固定済み。rustup が導入する。
      - name: Install pinned Rust toolchain
        run: rustup show
        working-directory: src-tauri

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # tauri build が beforeBuildCommand(npm run build) を実行してから
      # cargo build --release を行う。bundle.active=false のため成果物は単体 exe。
      - name: Build (npm run tauri build)
        run: npm run tauri build

      # タグ名で正式リリース（latest）を作成し、単体 exe を添付する。
      # リリースノートはコミット/PR 履歴から自動生成する。
      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "src-tauri/target/release/mviewr.exe" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --latest
