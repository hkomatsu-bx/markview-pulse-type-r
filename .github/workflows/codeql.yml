name: CodeQL

# CodeQL による first-party コードの静的解析（SAST）。Public リポジトリは無料。
# Rust は 2025-10 に GA（ビルド不要で解析）。cfg(windows) 依存コードを解析対象に
# 含めるため Rust は windows ランナーで実行する。
# フロントエンド（TypeScript）は untrusted な .md を扱う XSS 面があるため併せて解析する。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 週次フルスキャン（月曜 03:23 UTC）。新規 advisory・クエリ更新の取りこぼし防止。
    - cron: "23 3 * * 1"

permissions:
  contents: read

jobs:
  analyze-rust:
    name: Analyze (Rust)
    runs-on: windows-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml (1.97.0) を解決できるようツールチェーンを用意する。
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.97.0"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"

  analyze-js:
    name: Analyze (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
